<!-- static/index.html -->
<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube DL</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f9f9f9;
        }

        h1 {
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input[type="text"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        textarea {
            font-family: monospace;
            font-size: 12px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
        }

        .btn-primary {
            background-color: #007bff;
            color: white;
        }

        .btn-primary:disabled {
            background-color: #aaa;
            cursor: not-allowed;
        }

        .btn-secondary {
            background-color: #6c757d;
            color: white;
            margin-left: 10px;
        }

        #logArea {
            width: 100%;
            height: 300px;
            background-color: #222;
            color: #0f0;
            padding: 10px;
            font-family: monospace;
            overflow-y: auto;
            border-radius: 4px;
            box-sizing: border-box;
            margin-top: 20px;
            white-space: pre-wrap;
        }

        .progress-container {
            width: 100%;
            background-color: #ddd;
            border-radius: 4px;
            margin-top: 15px;
            display: none;
        }

        .progress-bar {
            height: 20px;
            background-color: #28a745;
            width: 0%;
            border-radius: 4px;
            transition: width 0.3s;
        }
    </style>
</head>

<body>

    <h1>YouTube DL</h1>

    <div class="form-group">
        <label for="urlInput">YouTube URL</label>
        <input type="text" id="urlInput" placeholder="https://www.youtube.com/watch?v=...">
    </div>

    <div class="form-group">
        <label for="typeSelect">ダウンロード形式</label>
        <select id="typeSelect">
            <option value="audio">音声 (MP3)</option>
            <option value="video">動画 (MP4)</option>
        </select>
    </div>

    <div class="form-group">
        <label for="cookieInput">YouTube Cookies (エラーが出る場合のみ、Get cookies.txt 等で取得したテキストを貼り付け)</label>
        <textarea id="cookieInput" rows="5" placeholder="# Netscape HTTP Cookie File&#10;..."></textarea>
    </div>

    <div class="form-group">
        <button id="downloadBtn" class="btn-primary" onclick="startDownload()">ダウンロード</button>
        <button class="btn-secondary" onclick="clearLogs()">クリア</button>
    </div>

    <div class="progress-container" id="progressContainer">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div id="logArea"></div>

    <script>
        let statusInterval = null;

        function clearLogs() {
            document.getElementById('logArea').innerText = '';
        }

        async function startDownload() {
            const url = document.getElementById('urlInput').value.trim();
            const type = document.getElementById('typeSelect').value;
            const cookies = document.getElementById('cookieInput').value.trim();

            if (!url) {
                alert("URLを入力してください");
                return;
            }

            const downloadBtn = document.getElementById('downloadBtn');
            downloadBtn.disabled = true;
            document.getElementById('progressContainer').style.display = 'block';
            document.getElementById('progressBar').style.width = '0%';

            // ログのポーリングを開始
            if (statusInterval) clearInterval(statusInterval);
            statusInterval = setInterval(fetchStatus, 1000);

            try {
                const response = await fetch('/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url, type: type, cookies: cookies })
                });

                if (response.ok) {
                    // バイナリデータとしてファイルを受信
                    const blob = await response.blob();

                    // ファイル名を取得（ヘッダーから抽出できなければデフォルト名）
                    let filename = "downloaded_file";
                    const disposition = response.headers.get('Content-Disposition');
                    if (disposition && disposition.indexOf('attachment') !== -1) {
                        const filenameRegex = /filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/;
                        const matches = filenameRegex.exec(disposition);
                        if (matches != null && matches[1]) {
                            filename = decodeURIComponent(matches[1].replace(/['"]/g, ''));
                        }
                    } else {
                        filename = type === 'audio' ? 'audio.mp3' : 'video.mp4';
                    }

                    // ダウンロードリンクを生成してクリック
                    const downloadUrl = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.style.display = 'none';
                    a.href = downloadUrl;
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(downloadUrl);
                    document.body.removeChild(a);
                } else {
                    const errData = await response.json();
                    console.error("Download Error:", errData);
                }
            } catch (error) {
                console.error("Fetch Error:", error);
            } finally {
                downloadBtn.disabled = false;
                // ポーリングを少し遅延して停止（最後のログを拾うため）
                setTimeout(() => {
                    if (statusInterval) clearInterval(statusInterval);
                    fetchStatus();
                }, 2000);
            }
        }

        async function fetchStatus() {
            try {
                const response = await fetch('/api/status');
                if (response.ok) {
                    const data = await response.json();

                    // ログエリアの更新
                    const logArea = document.getElementById('logArea');
                    logArea.innerText = data.logs.join('\n');
                    logArea.scrollTop = logArea.scrollHeight;

                    // プログレスバーの更新
                    if (data.progress > 0) {
                        document.getElementById('progressBar').style.width = data.progress + '%';
                    }
                }
            } catch (error) {
                console.log("Status fetch error", error);
            }
        }
    </script>
</body>

</html>
