<!-- static/index.html -->
<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>YouTube DL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: sans-serif;
            background: #fafafa;
            margin: 0;
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
        }

        .box {
            background: white;
            padding: 20px;
            border-radius: 8px;
            max-width: 600px;
            margin: auto;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        label {
            font-weight: bold;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            margin: 8px 0 16px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
        }

        #downloadBtn {
            background: #e53935;
            color: white;
        }

        #clearBtn {
            background: #757575;
            color: white;
            margin-left: 10px;
        }

        #logBox {
            background: #000;
            color: #0f0;
            padding: 10px;
            height: 200px;
            overflow-y: auto;
            margin-top: 20px;
            border-radius: 6px;
            font-size: 13px;
            white-space: pre-line;
        }
    </style>
</head>

<body>
    <div class="box">
        <h1>YouTube DL</h1>

        <label>YouTube URL</label>
        <input id="urlInput" placeholder="https://www.youtube.com">

        <label>ダウンロード形式</label>
        <select id="typeSelect">
            <option value="audio">音声 (MP3)</option>
            <option value="video">動画 (MP4)</option>
        </select>

        <button id="downloadBtn">ダウンロード</button>
        <button id="clearBtn">クリア</button>

        <div id="logBox">ログ：</div>
    </div>

    <script>
        const logBox = document.getElementById("logBox");

        function addLog(msg) {
            const time = new Date().toLocaleTimeString();
            logBox.textContent += `[${time}] ${msg}\n`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        async function fetchStatus() {
            const res = await fetch("/api/status");
            const data = await res.json();
            if (data.logs) {
                logBox.textContent = data.logs.join("\n");
            }
        }

        document.getElementById("downloadBtn").onclick = async () => {
            const url = document.getElementById("urlInput").value;
            const type = document.getElementById("typeSelect").value;

            if (!url) {
                addLog("URL が入力されていません");
                return;
            }

            addLog("ダウンロード開始…");

            const res = await fetch("/download", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ url, type })
            });

            if (!res.ok) {
                addLog("エラーが発生しました");
                return;
            }

            // Blob として受け取り、ダウンロード
            const blob = await res.blob();
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "download";
            a.click();

            addLog("ダウンロード完了");
        };

        document.getElementById("clearBtn").onclick = () => {
            logBox.textContent = "";
        };

        // 1秒ごとにステータス更新
        setInterval(fetchStatus, 1000);
    </script>
</body>

</html>
