<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Downloader (Light)</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        * {
            transition: background-color 0.2s, border-color 0.2s;
        }

        .log-terminal {
            background-color: #111;
            color: #FF80AB;
            font-family: 'Courier New', monospace;
            scroll-behavior: smooth;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: #FF4081;
            border-radius: 10px;
        }

        button {
            position: relative;
            overflow: hidden;
        }

        button::after {
            content: "";
            position: absolute;
            background: rgba(255, 255, 255, 0.4);
            width: 0;
            height: 0;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            pointer-events: none;
        }

        button:active::after {
            width: 200px;
            height: 200px;
            opacity: 1;
            transition: width 0.3s ease-out, height 0.3s ease-out, opacity 0.6s;
        }
    </style>
</head>

<body class="min-h-screen p-6 bg-white">

    <!-- ★ 左右 50% / 50% レイアウト -->
    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-6">

        <!-- 左側：入力フォーム -->
        <div class="bg-white border border-gray-200 rounded-2xl p-6 shadow">

            <div class="flex items-center justify-center gap-4 mb-6">
                <img src="/static/sua.png" alt="App Logo"
                    class="w-14 h-14 object-cover rounded-xl border-2 border-[#FF4081]">
                <h1 class="text-2xl font-bold text-gray-800">
                    <span class="text-[#FF4081]">YT</span> Downloader
                </h1>
            </div>

            <form class="space-y-5" id="downloadForm">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">YouTube URL</label>
                    <input type="text" id="urlInput"
                        class="w-full px-4 py-2 bg-gray-50 border border-gray-300 rounded-xl focus:border-[#FF4081] outline-none"
                        placeholder="https://youtu.be/..." required>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">ダウンロード形式</label>
                        <select id="formatInput"
                            class="w-full px-4 py-2 bg-gray-50 border border-gray-300 rounded-xl focus:border-[#FF4081] outline-none">
                            <option value="audio">音声 (MP3)</option>
                            <option value="video">動画 (MP4)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">画質 (動画のみ)</label>
                        <select id="qualityInput"
                            class="w-full px-4 py-2 bg-gray-50 border border-gray-300 rounded-xl focus:border-[#FF4081] outline-none">
                            <option value="best">最高画質 (1080p~)</option>
                            <option value="1080">1080p 以下</option>
                            <option value="720">720p 以下</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">YouTube Cookies</label>
                    <textarea id="cookieInput"
                        class="w-full px-4 py-2 bg-gray-50 border border-gray-300 rounded-xl outline-none text-xs resize-none"
                        rows="2" placeholder="必要な場合のみ貼り付け"></textarea>
                </div>

                <!-- 進捗バー -->
                <div id="progressWrapper" class="hidden">
                    <div class="flex justify-between text-xs font-bold text-[#FF4081] mb-1">
                        <span id="progressText">準備中...</span>
                        <span id="progressPercent">0%</span>
                    </div>
                    <div class="w-full bg-pink-100 rounded-full h-2">
                        <div id="progressBar" class="bg-[#FF4081] h-2 rounded-full" style="width: 0%"></div>
                    </div>
                </div>

                <!-- ボタン -->
                <div class="flex gap-4 pt-2">
                    <button type="submit" id="downloadBtn"
                        class="flex-1 bg-[#FF4081] hover:bg-[#E91E63] text-white font-bold py-3 rounded-xl shadow">
                        ダウンロード
                    </button>

                    <button type="button" id="clearBtn"
                        class="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-3 rounded-xl shadow">
                        クリア
                    </button>
                </div>
            </form>
        </div>

        <!-- 右側：ログ画面 -->
        <div class="log-terminal rounded-2xl p-4 border border-gray-700 h-[85vh] overflow-y-scroll" id="logArea"></div>

    </div>

    <!-- JavaScript（軽量版） -->
    <script>
        let lastLogCount = 0;

        function appendLog(line) {
            const logArea = document.getElementById("logArea");
            const div = document.createElement("div");
            div.textContent = line;
            logArea.appendChild(div);
            logArea.scrollTop = logArea.scrollHeight;
        }

        function animateButton(btn) {
            btn.style.transform = "scale(0.92)";
            setTimeout(() => btn.style.transform = "scale(1)", 120);
        }

        // ★ ダウンロード処理
        document.getElementById("downloadForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            animateButton(document.getElementById("downloadBtn"));

            const url = document.getElementById("urlInput").value;
            const format = document.getElementById("formatInput").value;
            const quality = document.getElementById("qualityInput").value;
            const cookies = document.getElementById("cookieInput").value;

            appendLog("▶ ダウンロードを開始します...");
            document.getElementById("progressWrapper").classList.remove("hidden");

            try {
                const response = await fetch("/download", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        url: url,
                        type: format,
                        quality: quality,
                        cookies: cookies
                    })
                });

                if (!response.ok) {
                    try {
                        const errJson = await response.json();
                        appendLog("▶ エラー: " + (errJson.error || "不明なエラー"));
                    } catch {
                        appendLog("▶ エラー: サーバー応答が不正です");
                    }
                    return;
                }

                appendLog("▶ ダウンロード完了。保存します...");

                const blob = await response.blob();
                const urlObj = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = urlObj;
                a.download = "";
                document.body.appendChild(a);
                a.click();
                a.remove();
                URL.revokeObjectURL(urlObj);

            } catch (err) {
                appendLog("▶ 通信エラー: " + err.message);
            }
        });

        // ★ クリア（フロントだけ消す）
        document.getElementById("clearBtn").addEventListener("click", function () {
            animateButton(this);
            document.getElementById("urlInput").value = "";
            document.getElementById("cookieInput").value = "";
            document.getElementById("logArea").innerHTML = "";
            lastLogCount = 0;
            document.getElementById("progressWrapper").classList.add("hidden");
            appendLog("▶ 入力内容をクリアしました。");
        });

        // ★ 進捗＆ログ差分更新（3秒間隔）
        setInterval(async () => {
            try {
                const res = await fetch("/api/status");
                const data = await res.json();

                // 進捗バー
                document.getElementById("progressBar").style.width = data.progress + "%";
                document.getElementById("progressPercent").textContent = data.progress + "%";

                if (data.status === "downloading") {
                    document.getElementById("progressText").textContent = "ダウンロード中...";
                } else if (data.status === "completed") {
                    document.getElementById("progressText").textContent = "完了";
                } else if (data.status === "error") {
                    document.getElementById("progressText").textContent = "エラー";
                }

                // 差分ログだけ追加
                const newLogs = data.logs.slice(lastLogCount);
                newLogs.forEach(line => appendLog(line));
                lastLogCount = data.logs.length;

            } catch (e) {
                console.log("status error", e);
            }
        }, 3000); // ← 3秒間隔に変更
    </script>

</body>

</html>
